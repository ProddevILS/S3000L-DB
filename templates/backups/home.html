{% extends 'base.html' %}{% block content %}<h1>Backup</h1><form method="post" action="create/">{% csrf_token %}<button class="btn btn-danger btn-lg">Backup erstellen</button></form><h2>Letzte Backups</h2><table class="table"><tr><th>Zeit</th><th>Datei</th><th>Status</th><th>Meldung</th></tr>{% for l in logs %}<tr><td>{{ l.created_at }}</td><td>{{ l.backup_file }}</td><td>{{ l.status }}</td><td>{{ l.message }}</td></tr>{% endfor %}</table>{% endblock %}
