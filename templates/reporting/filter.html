{% extends 'base.html' %}{% block content %}<h1>Kunden-/Projektübersicht</h1><form class="row g-2"><input class="form-control" type="date" name="from"><input class="form-control" type="date" name="to"><select class="form-select" name="billable"><option value="">Alle</option><option value="1">Abrechenbar</option><option value="0">Nicht abrechenbar</option></select><button class="btn btn-primary">Filtern</button></form><div class="table-responsive"><table class="table"><tr><th>Datum</th><th>Kunde</th><th>Projekt</th><th>Tätigkeit</th><th>Min</th><th>Netto</th></tr>{% for e in objects %}<tr><td>{{ e.date }}</td><td>{{ e.customer }}</td><td>{{ e.project }}</td><td>{{ e.activity_type }}</td><td>{{ e.duration_minutes }}</td><td>{{ e.amount_net }}</td></tr>{% endfor %}</table></div>{% endblock %}
